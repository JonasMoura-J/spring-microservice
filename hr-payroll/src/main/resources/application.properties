spring.application.name=hrpayroll
server.port=8101

eureka.client.service-url.defaultZone=http://localhost:8761/eureka


resilience4j.circuitbreaker.instances.hr-worker.slidingWindowSize=6
resilience4j.circuitbreaker.instances.hr-worker.failureRateThreshold=6
resilience4j.circuitbreaker.instances.hr-worker.waitDurationInOpenState=6s

feign.client.config.default.connectTimeout=2000
feign.client.config.default.readTimeout=2000

