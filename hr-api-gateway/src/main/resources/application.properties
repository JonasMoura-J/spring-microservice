spring.application.name=hr-api-gateway

server.port=8765
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=worker-route
spring.cloud.gateway.routes[0].uri=lb://hr-worker
spring.cloud.gateway.routes[0].predicates[0]=Path=/hr-worker/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/hr-worker/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[1].id=payroll-route
spring.cloud.gateway.routes[1].uri=lb://hr-payroll
spring.cloud.gateway.routes[1].predicates[0]=Path=/hr-payroll/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/hr-payroll/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[2].id=user-route
spring.cloud.gateway.routes[2].uri=lb://hr-user
spring.cloud.gateway.routes[2].predicates[0]=Path=/hr-user/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/hr-user/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[3].id=oauth-route
spring.cloud.gateway.routes[3].uri=lb://hr-oauth
spring.cloud.gateway.routes[3].predicates[0]=Path=/hr-oauth/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/hr-oauth/(?<segment>.*), /${segment}

#Timeout config
resilience4j.circuitbreaker.instances.hr-worker.slidingWindowSize=6
resilience4j.circuitbreaker.instances.hr-worker.failureRateThreshold=6
resilience4j.circuitbreaker.instances.hr-worker.waitDurationInOpenState=6s

feign.client.config.default.connectTimeout=2000
feign.client.config.default.readTimeout=2000